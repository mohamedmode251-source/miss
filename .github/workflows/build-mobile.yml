name: Build Mobile Apps (Android & iOS)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web App
        run: npm run build

      - name: Copy Web Assets to Android
        run: |
          rm -rf android/app/src/main/assets/public
          mkdir -p android/app/src/main/assets/public
          cp -r build/* android/app/src/main/assets/public/

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug > ../build_output.log 2>&1

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-log
          path: build_output.log

      - name: Upload Android APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web App
        run: npm run build

      - name: Copy Web Assets to iOS
        run: |
          rm -rf ios/App/App/public
          mkdir -p ios/App/App/public
          cp -r build/* ios/App/App/public/

      - name: Upload iOS Xcode Project Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcode-project
          path: ios/
          if-no-files-found: error
